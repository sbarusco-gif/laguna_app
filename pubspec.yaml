name: laguna_app
description: "Navigatore Laguna Venezia con Bussola"
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: '>=3.3.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter

  # MOTORE MAPPA E COORDINATE
  flutter_map: ^6.1.0
  latlong2: ^0.9.1

  # SENSORI E RETE
  geolocator: ^10.1.0
  flutter_compass: ^0.8.0
  http: ^1.1.0

  # ICONE
  cupertino_icons: ^1.0.6

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^3.0.0

flutter:
  uses-material-design: true
  assets:
    - assets/canali.json